<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Sphere</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const FibonacciSphere = () => {
            const mountRef = useRef(null);

            // -- Configuration State (UI) --
            const [pointCount, setPointCount] = useState(1500);
            const [radius, setRadius] = useState(15);
            const [pointSize, setPointSize] = useState(0.5);
            const [rotationSpeed, setRotationSpeed] = useState(0.2);
            const [isRainbow, setIsRainbow] = useState(true);
            const [baseColor, setBaseColor] = useState('#4ade80');
            const [showUI, setShowUI] = useState(true);

            // New Visual/Geo States
            const [shape, setShape] = useState('sphere');
            const [noiseStrength, setNoiseStrength] = useState(0.5);
            const [noiseSpeed, setNoiseSpeed] = useState(0.01);
            const [showConnections, setShowConnections] = useState(false);
            const [showPlanets, setShowPlanets] = useState(true);

            // -- Audio Visualization State --
            const [audioFile, setAudioFile] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [audioGain, setAudioGain] = useState(2.0);
            const [audioSmoothing, setAudioSmoothing] = useState(0.8);
            const [bassBoost, setBassBoost] = useState(1.2);

            // -- Refs for Animation Loop (Performance) --
            const paramsRef = useRef({
                pointCount, radius, pointSize, rotationSpeed, isRainbow, baseColor,
                shape, noiseStrength, noiseSpeed, showConnections, showPlanets,
                audioGain, bassBoost
            });

            useEffect(() => {
                paramsRef.current = {
                    pointCount, radius, pointSize, rotationSpeed, isRainbow, baseColor,
                    shape, noiseStrength, noiseSpeed, showConnections, showPlanets,
                    audioGain, bassBoost
                };
            }, [pointCount, radius, pointSize, rotationSpeed, isRainbow, baseColor, shape, noiseStrength, noiseSpeed, showConnections, showPlanets, audioGain, bassBoost]);

            // -- Three.js Refs --
            const sceneRef = useRef(null);
            const rendererRef = useRef(null);
            const cameraRef = useRef(null);
            const pointsMeshRef = useRef(null);
            const linesMeshRef = useRef(null);
            const planetsMeshRef = useRef(null);
            const frameIdRef = useRef(null);
            const materialRef = useRef(null);
            const linesMaterialRef = useRef(null);
            const rotationGroupRef = useRef(null);

            // Audio Refs
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const dataArrayRef = useRef(null);
            const audioElementRef = useRef(null);

            // -- Physics Data --
            const MAX_PLANETS = 15;
            const planetsDataRef = useRef([]);

            // -- Geometry Cache --
            const targetsRef = useRef({
                sphere: new Float32Array(0),
                cube: new Float32Array(0),
                torus: new Float32Array(0)
            });
            const currentBasePositionsRef = useRef(new Float32Array(0));
            const originalColorsRef = useRef(new Float32Array(0));

            // -- Helpers --
            const createGlowTexture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 32;
                canvas.height = 32;
                const context = canvas.getContext('2d');
                const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                context.fillStyle = gradient;
                context.fillRect(0, 0, 32, 32);
                return new THREE.CanvasTexture(canvas);
            };

            const generateShapes = useCallback((count) => {
                const sphere = new Float32Array(count * 3);
                const cube = new Float32Array(count * 3);
                const torus = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);

                const phi = Math.PI * (3 - Math.sqrt(5));
                const colorObj = new THREE.Color(paramsRef.current.baseColor);

                for (let i = 0; i < count; i++) {
                    const y = 1 - (i / (count - 1)) * 2;
                    const r = Math.sqrt(1 - y * y);
                    const theta = phi * i;
                    const sx = Math.cos(theta) * r;
                    const sy = y;
                    const sz = Math.sin(theta) * r;
                    sphere[i * 3] = sx; sphere[i * 3 + 1] = sy; sphere[i * 3 + 2] = sz;

                    const maxComp = Math.max(Math.abs(sx), Math.abs(sy), Math.abs(sz));
                    if (maxComp > 0) {
                        cube[i * 3] = sx / maxComp; cube[i * 3 + 1] = sy / maxComp; cube[i * 3 + 2] = sz / maxComp;
                    }

                    const u = (i / count) * Math.PI * 2 * 10;
                    const v = (i / count) * Math.PI * 2;
                    const tubeRadius = 0.4;
                    const ringRadius = 0.8;
                    torus[i * 3] = (ringRadius + tubeRadius * Math.cos(v)) * Math.cos(u);
                    torus[i * 3 + 1] = (ringRadius + tubeRadius * Math.cos(v)) * Math.sin(u);
                    torus[i * 3 + 2] = tubeRadius * Math.sin(v) * 0.5;

                    if (paramsRef.current.isRainbow) {
                        const hue = i / count;
                        const tempColor = new THREE.Color().setHSL(hue, 0.8, 0.6);
                        colors[i * 3] = tempColor.r; colors[i * 3 + 1] = tempColor.g; colors[i * 3 + 2] = tempColor.b;
                    } else {
                        colors[i * 3] = colorObj.r; colors[i * 3 + 1] = colorObj.g; colors[i * 3 + 2] = colorObj.b;
                    }
                }

                targetsRef.current = { sphere, cube, torus };
                currentBasePositionsRef.current = new Float32Array(sphere);
                originalColorsRef.current = colors;
                return { colors };
            }, []);

            // -- Initialize Physics --
            const initPhysics = () => {
                const planets = [];
                const geometry = new THREE.IcosahedronGeometry(1, 2);
                const material = new THREE.MeshStandardMaterial({
                    roughness: 0.1, metalness: 0.1, emissive: 0x222222, color: 0xffffff
                });

                const mesh = new THREE.InstancedMesh(geometry, material, MAX_PLANETS);
                mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

                const dummy = new THREE.Object3D();
                const color = new THREE.Color();

                for (let i = 0; i < MAX_PLANETS; i++) {
                    const rad = Math.random() * 0.8 + 0.5;
                    const pos = new THREE.Vector3((Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15);
                    const vel = new THREE.Vector3((Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2);

                    planets.push({ pos, vel, radius: rad, mass: rad * 2 });

                    dummy.position.copy(pos);
                    dummy.scale.set(rad, rad, rad);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);

                    color.setHSL(Math.random(), 0.9, 0.6);
                    mesh.setColorAt(i, color);
                }

                mesh.instanceColor.needsUpdate = true;
                planetsDataRef.current = planets;
                return mesh;
            };

            // -- Initialization --
            useEffect(() => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color('#050505');
                scene.fog = new THREE.Fog('#050505', 20, 100);
                sceneRef.current = scene;

                const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 50;
                cameraRef.current = camera;

                const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mountRef.current.appendChild(renderer.domElement);
                rendererRef.current = renderer;

                const light = new THREE.PointLight(0xffffff, 5, 200);
                light.position.set(20, 20, 20);
                scene.add(light);

                const light2 = new THREE.PointLight(0x60a5fa, 3, 200);
                light2.position.set(-20, -10, 20);
                scene.add(light2);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                const group = new THREE.Group();
                scene.add(group);
                rotationGroupRef.current = group;

                // 1. Points
                const { colors } = generateShapes(pointCount);
                const pGeometry = new THREE.BufferGeometry();
                pGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pointCount * 3), 3));
                pGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                const pMaterial = new THREE.PointsMaterial({
                    size: pointSize,
                    vertexColors: true,
                    map: createGlowTexture(),
                    alphaTest: 0.01,
                    transparent: true,
                    opacity: 0.9,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                });
                materialRef.current = pMaterial;
                const points = new THREE.Points(pGeometry, pMaterial);
                group.add(points);
                pointsMeshRef.current = points;

                // 2. Lines
                const connectionsPerPoint = 2;
                const lGeometry = new THREE.BufferGeometry();
                const lPos = new Float32Array(pointCount * connectionsPerPoint * 3 * 2);
                lGeometry.setAttribute('position', new THREE.BufferAttribute(lPos, 3));
                const lMaterial = new THREE.LineBasicMaterial({
                    color: 0xffffff, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending
                });
                linesMaterialRef.current = lMaterial;
                const lines = new THREE.LineSegments(lGeometry, lMaterial);
                lines.visible = false;
                group.add(lines);
                linesMeshRef.current = lines;

                // 3. Planets
                const planetsMesh = initPhysics();
                group.add(planetsMesh);
                planetsMeshRef.current = planetsMesh;

                // -- Animation Loop --
                let time = 0;
                const dummy = new THREE.Object3D();
                const G = 0.005;

                const animate = () => {
                    frameIdRef.current = requestAnimationFrame(animate);
                    time += 0.01;

                    const params = paramsRef.current;

                    if (rotationGroupRef.current && !isDragging.current) {
                        rotationGroupRef.current.rotation.y += params.rotationSpeed * 0.005;
                        rotationGroupRef.current.rotation.x += params.rotationSpeed * 0.002;
                    }

                    // Audio Processing
                    let bassScale = 0;
                    let dataArray = null;

                    if (analyserRef.current && dataArrayRef.current) {
                        analyserRef.current.getByteFrequencyData(dataArrayRef.current);
                        dataArray = dataArrayRef.current;
                        let bassSum = 0;
                        const bassRange = Math.floor(dataArray.length * 0.05);
                        for (let b = 0; b < bassRange; b++) bassSum += dataArray[b];
                        bassScale = (bassSum / bassRange / 255) * params.bassBoost;

                        if (bassScale > 0.5) rotationGroupRef.current.rotation.z += 0.02 * bassScale;
                    }

                    // -- Physics Simulation --
                    if (params.showPlanets && planetsMeshRef.current) {
                        planetsMeshRef.current.visible = true;
                        const planets = planetsDataRef.current;
                        const containerScale = params.radius + (bassScale * 5);

                        for (let i = 0; i < MAX_PLANETS; i++) {
                            const p = planets[i];

                            p.pos.add(p.vel);

                            if (params.shape === 'cube') {
                                const limit = containerScale * 0.8;
                                if (Math.abs(p.pos.x) + p.radius > limit) { p.vel.x *= -1; p.pos.x = Math.sign(p.pos.x) * (limit - p.radius); }
                                if (Math.abs(p.pos.y) + p.radius > limit) { p.vel.y *= -1; p.pos.y = Math.sign(p.pos.y) * (limit - p.radius); }
                                if (Math.abs(p.pos.z) + p.radius > limit) { p.vel.z *= -1; p.pos.z = Math.sign(p.pos.z) * (limit - p.radius); }
                            } else if (params.shape === 'torus') {
                                const majorR = containerScale * 0.8;
                                const minorR = containerScale * 0.4;
                                const q = new THREE.Vector2(Math.sqrt(p.pos.x * p.pos.x + p.pos.z * p.pos.z) - majorR, p.pos.y);
                                const len = q.length();

                                if (len + p.radius > minorR) {
                                    const angle = Math.atan2(p.pos.z, p.pos.x);
                                    const tubeCenterX = Math.cos(angle) * majorR;
                                    const tubeCenterZ = Math.sin(angle) * majorR;
                                    const tubeCenter = new THREE.Vector3(tubeCenterX, 0, tubeCenterZ);
                                    const normal = new THREE.Vector3().subVectors(p.pos, tubeCenter).normalize();
                                    p.vel.reflect(normal);
                                    const pushBack = normal.multiplyScalar(minorR - p.radius - 0.1);
                                    p.pos.copy(tubeCenter).add(pushBack);
                                }
                            } else {
                                const dist = p.pos.length();
                                if (dist + p.radius > containerScale) {
                                    const normal = p.pos.clone().normalize();
                                    p.vel.reflect(normal);
                                    p.pos.copy(normal.multiplyScalar(containerScale - p.radius));
                                }
                            }

                            for (let j = i + 1; j < MAX_PLANETS; j++) {
                                const p2 = planets[j];
                                const diff = new THREE.Vector3().subVectors(p2.pos, p.pos);
                                const dist = diff.length();
                                const minDist = p.radius + p2.radius;

                                if (dist > 0.1) {
                                    const force = (G * p.mass * p2.mass) / (dist * dist);
                                    const forceVec = diff.clone().normalize().multiplyScalar(force);
                                    p.vel.add(forceVec.clone().divideScalar(p.mass));
                                    p2.vel.sub(forceVec.clone().divideScalar(p2.mass));
                                }

                                if (dist < minDist) {
                                    const normal = diff.clone().normalize();
                                    const overlap = minDist - dist;
                                    const push = normal.clone().multiplyScalar(overlap * 0.5);
                                    p.pos.sub(push);
                                    p2.pos.add(push);

                                    const relVel = new THREE.Vector3().subVectors(p.vel, p2.vel);
                                    const speed = relVel.dot(normal);

                                    if (speed < 0) {
                                        const restitution = 1.0;
                                        const impulse = ((1 + restitution) * speed) / (p.mass + p2.mass);
                                        const impulseVec = normal.multiplyScalar(impulse);
                                        p.vel.sub(impulseVec.clone().multiplyScalar(p2.mass));
                                        p2.vel.add(impulseVec.clone().multiplyScalar(p.mass));
                                    }
                                }
                            }

                            if (bassScale > 0.2) {
                                p.vel.add(new THREE.Vector3((Math.random() - 0.5) * 0.01, (Math.random() - 0.5) * 0.01, (Math.random() - 0.5) * 0.01));
                            }

                            dummy.position.copy(p.pos);
                            dummy.scale.set(p.radius, p.radius, p.radius);
                            dummy.updateMatrix();
                            planetsMeshRef.current.setMatrixAt(i, dummy.matrix);
                        }
                        planetsMeshRef.current.instanceMatrix.needsUpdate = true;
                    } else if (planetsMeshRef.current) {
                        planetsMeshRef.current.visible = false;
                    }

                    // -- Main Geometry Updates --
                    if (pointsMeshRef.current) {
                        const positions = pointsMeshRef.current.geometry.attributes.position.array;
                        const geometryCount = pointsMeshRef.current.geometry.attributes.position.count;
                        const requestedCount = params.pointCount;
                        const count = Math.min(geometryCount, requestedCount);

                        const targetBuffer = targetsRef.current[params.shape] || targetsRef.current.sphere;
                        const currentBuffer = currentBasePositionsRef.current;
                        const lerpFactor = 0.05;
                        const nFreq = 2.0;
                        const nAmp = params.noiseStrength;

                        for (let i = 0; i < count; i++) {
                            const idx = i * 3;
                            if (idx + 2 >= targetBuffer.length || idx + 2 >= currentBuffer.length) continue;

                            currentBuffer[idx] += (targetBuffer[idx] - currentBuffer[idx]) * lerpFactor;
                            currentBuffer[idx + 1] += (targetBuffer[idx + 1] - currentBuffer[idx + 1]) * lerpFactor;
                            currentBuffer[idx + 2] += (targetBuffer[idx + 2] - currentBuffer[idx + 2]) * lerpFactor;

                            let x = currentBuffer[idx];
                            let y = currentBuffer[idx + 1];
                            let z = currentBuffer[idx + 2];

                            const noise = Math.sin(x * nFreq + time * params.noiseSpeed * 50) * Math.cos(y * nFreq + time * params.noiseSpeed * 50) * Math.sin(z * nFreq + time * params.noiseSpeed * 50);

                            let audioDisp = 0;
                            if (dataArray) {
                                const binIndex = Math.floor((i / count) * (dataArray.length / 2));
                                audioDisp = (dataArray[binIndex] / 255) * params.audioGain;
                            }

                            const totalScale = params.radius + (bassScale * 2) + (audioDisp * 3) + (noise * nAmp * 2);

                            positions[idx] = x * totalScale;
                            positions[idx + 1] = y * totalScale;
                            positions[idx + 2] = z * totalScale;
                        }
                        pointsMeshRef.current.geometry.attributes.position.needsUpdate = true;

                        if (params.showConnections && linesMeshRef.current) {
                            linesMeshRef.current.visible = true;
                            const lPositions = linesMeshRef.current.geometry.attributes.position.array;
                            let lIdx = 0;
                            for (let i = 0; i < count; i++) {
                                if (i + 2 >= count) break;
                                const p1x = positions[i * 3], p1y = positions[i * 3 + 1], p1z = positions[i * 3 + 2];
                                if (lIdx + 11 >= lPositions.length) break;
                                lPositions[lIdx++] = p1x; lPositions[lIdx++] = p1y; lPositions[lIdx++] = p1z;
                                lPositions[lIdx++] = positions[(i + 1) * 3]; lPositions[lIdx++] = positions[(i + 1) * 3 + 1]; lPositions[lIdx++] = positions[(i + 1) * 3 + 2];
                                if (i + 5 < count) {
                                    lPositions[lIdx++] = p1x; lPositions[lIdx++] = p1y; lPositions[lIdx++] = p1z;
                                    lPositions[lIdx++] = positions[(i + 5) * 3]; lPositions[lIdx++] = positions[(i + 5) * 3 + 1]; lPositions[lIdx++] = positions[(i + 5) * 3 + 2];
                                }
                            }
                            linesMeshRef.current.geometry.attributes.position.needsUpdate = true;
                        } else if (linesMeshRef.current) {
                            linesMeshRef.current.visible = false;
                        }
                    }

                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    if (cameraRef.current && rendererRef.current) {
                        cameraRef.current.aspect = window.innerWidth / window.innerHeight;
                        cameraRef.current.updateProjectionMatrix();
                        rendererRef.current.setSize(window.innerWidth, window.innerHeight);
                    }
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(frameIdRef.current);
                    if (mountRef.current && rendererRef.current) {
                        mountRef.current.removeChild(rendererRef.current.domElement);
                    }
                    if (audioContextRef.current) audioContextRef.current.close();
                    pGeometry.dispose();
                    pMaterial.dispose();
                };
            }, []);

            // -- Re-Generate Geometry when Count changes --
            useEffect(() => {
                if (!pointsMeshRef.current) return;
                const { colors } = generateShapes(pointCount);
                const geometry = pointsMeshRef.current.geometry;
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pointCount * 3), 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                if (linesMeshRef.current) {
                    const lPos = new Float32Array(pointCount * 4 * 3 * 2);
                    linesMeshRef.current.geometry.setAttribute('position', new THREE.BufferAttribute(lPos, 3));
                }
            }, [pointCount, isRainbow, baseColor, generateShapes]);

            // -- Event Handlers --
            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    if (audioElementRef.current) {
                        audioElementRef.current.pause();
                        audioElementRef.current.src = "";
                    }
                    const url = URL.createObjectURL(file);
                    setAudioFile(url);
                }
            };

            const togglePlay = async () => {
                if (!audioFile) return;
                if (!audioContextRef.current) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContextRef.current = new AudioContext();
                }
                if (audioContextRef.current.state === 'suspended') await audioContextRef.current.resume();

                if (!audioElementRef.current) {
                    const audio = new Audio(audioFile);
                    audio.crossOrigin = "anonymous";
                    audioElementRef.current = audio;
                    const source = audioContextRef.current.createMediaElementSource(audio);
                    const analyser = audioContextRef.current.createAnalyser();
                    analyser.fftSize = 2048;
                    analyser.smoothingTimeConstant = audioSmoothing;
                    source.connect(analyser);
                    analyser.connect(audioContextRef.current.destination);
                    analyserRef.current = analyser;
                    dataArrayRef.current = new Uint8Array(analyser.frequencyBinCount);
                    audio.onended = () => setIsPlaying(false);
                }
                if (isPlaying) { audioElementRef.current.pause(); setIsPlaying(false); }
                else { audioElementRef.current.play(); setIsPlaying(true); }
            };

            // Input Handling
            const isDragging = useRef(false);
            const previousMousePosition = useRef({ x: 0, y: 0 });
            const handleMouseDown = (e) => { isDragging.current = true; previousMousePosition.current = { x: e.clientX, y: e.clientY }; };
            const handleMouseMove = (e) => {
                if (isDragging.current && rotationGroupRef.current) {
                    const deltaMove = { x: e.clientX - previousMousePosition.current.x, y: e.clientY - previousMousePosition.current.y };
                    const deltaRotationQuaternion = new THREE.Quaternion().setFromEuler(new THREE.Euler((deltaMove.y * 0.005), (deltaMove.x * 0.005), 0, 'XYZ'));
                    rotationGroupRef.current.quaternion.multiplyQuaternions(deltaRotationQuaternion, rotationGroupRef.current.quaternion);
                    previousMousePosition.current = { x: e.clientX, y: e.clientY };
                }
            };
            const handleMouseUp = () => { isDragging.current = false; };
            const handleWheel = (e) => {
                if (cameraRef.current) {
                    const zoomSpeed = 0.1;
                    let newZ = cameraRef.current.position.z + e.deltaY * zoomSpeed;
                    newZ = Math.max(5, Math.min(200, newZ));
                    cameraRef.current.position.z = newZ;
                }
            };

            return (
                <div className="relative w-full h-screen bg-[#050505] overflow-hidden font-sans text-slate-200 selection:bg-pink-500 selection:text-white">
                    <div
                        ref={mountRef} className="absolute inset-0 z-0 cursor-move"
                        onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} onWheel={handleWheel}
                    />

                    <button onClick={() => setShowUI(!showUI)} className="absolute top-4 right-4 z-20 p-2 bg-slate-800/40 backdrop-blur-md rounded-full hover:bg-slate-700 transition-colors border border-slate-700/50 text-sm">
                        {showUI ? '⊟' : '⊞'}
                    </button>

                    <div className={`absolute top-4 left-4 z-10 w-80 bg-slate-900/80 backdrop-blur-xl rounded-xl border border-slate-700/50 shadow-2xl transition-all duration-300 flex flex-col max-h-[90vh] ${showUI ? 'opacity-100 translate-x-0' : 'opacity-0 -translate-x-10 pointer-events-none'}`}>
                        <div className="p-4 border-b border-slate-700/50 flex items-center gap-3 bg-slate-900/50 rounded-t-xl">
                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${isPlaying ? 'bg-gradient-to-r from-pink-500 to-violet-600 animate-pulse' : 'bg-slate-700'}`}>
                                ⚡
                            </div>
                            <h1 className="font-bold text-base tracking-wide text-white">Neon Sphere</h1>
                        </div>

                        <div className="p-4 space-y-6 overflow-y-auto custom-scrollbar">
                            {/* Audio Source */}
                            <div className="bg-slate-800/40 rounded-lg p-3 space-y-3 border border-slate-700/30">
                                <div className="flex items-center gap-2 text-xs font-bold text-pink-400 uppercase tracking-wider">🎵 Audio Source</div>
                                <div className="flex gap-2">
                                    <label className="flex-1 cursor-pointer bg-slate-700/50 hover:bg-slate-600/50 transition-colors rounded h-9 flex items-center justify-center gap-2 text-xs border border-slate-600/50">
                                        📁
                                        <span className="truncate max-w-[100px]">{audioFile ? 'File Loaded' : 'Load MP3'}</span>
                                        <input type="file" accept="audio/*" onChange={handleFileUpload} className="hidden" />
                                    </label>
                                    <button onClick={togglePlay} disabled={!audioFile} className={`h-9 px-3 rounded flex items-center justify-center transition-all ${isPlaying ? 'bg-rose-500/80 hover:bg-rose-600' : 'bg-emerald-500/80 hover:bg-emerald-600'} text-white disabled:opacity-50 disabled:cursor-not-allowed`}>
                                        {isPlaying ? '⏸' : '▶'}
                                    </button>
                                </div>
                            </div>

                            {/* Shape & Noise */}
                            <div className="space-y-3">
                                <div className="flex items-center gap-2 text-xs font-bold text-cyan-400 uppercase tracking-wider">📦 Shape & Noise</div>
                                <div className="flex bg-slate-800/50 p-1 rounded-lg">
                                    {['sphere', 'cube', 'torus'].map((s) => (
                                        <button key={s} onClick={() => setShape(s)} className={`flex-1 py-1 text-xs capitalize rounded-md transition-all ${shape === s ? 'bg-slate-600 text-white shadow-sm' : 'text-slate-400 hover:text-white'}`}>{s}</button>
                                    ))}
                                </div>
                                <div className="space-y-1 pt-1">
                                    <div className="flex justify-between text-xs text-slate-400"><span>Noise Strength</span><span>{noiseStrength.toFixed(2)}</span></div>
                                    <input type="range" min="0" max="2" step="0.05" value={noiseStrength} onChange={(e) => setNoiseStrength(Number(e.target.value))} className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500" />
                                </div>
                            </div>

                            {/* Visuals */}
                            <div className="space-y-3">
                                <div className="flex items-center gap-2 text-xs font-bold text-violet-400 uppercase tracking-wider">⬡ Visuals</div>
                                <button onClick={() => setShowConnections(!showConnections)} className={`w-full py-2 rounded-lg text-xs font-semibold border transition-all flex items-center justify-center gap-2 ${showConnections ? 'bg-violet-500/20 border-violet-500 text-violet-300' : 'bg-slate-800/40 border-slate-700 text-slate-400 hover:bg-slate-700/50'}`}>
                                    📊 {showConnections ? 'Plexus Lines: ON' : 'Plexus Lines: OFF'}
                                </button>

                                <button onClick={() => setShowPlanets(!showPlanets)} className={`w-full py-2 rounded-lg text-xs font-semibold border transition-all flex items-center justify-center gap-2 ${showPlanets ? 'bg-yellow-500/20 border-yellow-500 text-yellow-300' : 'bg-slate-800/40 border-slate-700 text-slate-400 hover:bg-slate-700/50'}`}>
                                    💿 {showPlanets ? 'Planets: ON' : 'Planets: OFF'}
                                </button>

                                <div className="grid grid-cols-2 gap-3 pt-2">
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 uppercase">Points</label>
                                        <input type="number" value={pointCount} onChange={(e) => setPointCount(Number(e.target.value))} className="w-full bg-slate-800/50 border border-slate-700 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-violet-500" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-500 uppercase">Size</label>
                                        <input type="number" value={pointSize} step="0.1" onChange={(e) => setPointSize(Number(e.target.value))} className="w-full bg-slate-800/50 border border-slate-700 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-violet-500" />
                                    </div>
                                </div>
                            </div>

                            {/* Reactivity */}
                            <div className="space-y-3 pt-2 border-t border-slate-800">
                                <div className="flex items-center gap-2 text-xs font-bold text-emerald-400 uppercase tracking-wider">📈 Reactivity</div>
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs text-slate-400"><span>Gain</span><span>{audioGain}x</span></div>
                                    <input type="range" min="0" max="5" step="0.1" value={audioGain} onChange={(e) => setAudioGain(Number(e.target.value))} className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
                                </div>
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs text-slate-400"><span>Bass Boost</span><span>{bassBoost}x</span></div>
                                    <input type="range" min="0" max="3" step="0.1" value={bassBoost} onChange={(e) => setBassBoost(Number(e.target.value))} className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<FibonacciSphere />);
    </script>
</body>

</html>
